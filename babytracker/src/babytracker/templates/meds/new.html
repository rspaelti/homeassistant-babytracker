{% extends "layout.html" %}

{% block title %}Medikament · {{ child_name }}{% endblock %}

{% block content %}

<div class="flex items-center gap-2 mb-3">
  <a href="{{ root }}/meds" class="text-slate-500 dark:text-slate-400 text-sm">← Zurück</a>
</div>

<h1 class="text-xl font-bold mb-4">
  {% if chosen %}{{ chosen.label }}{% else %}Neues Medikament{% endif %}
</h1>

<form method="post" action="{{ root }}/meds/new" class="space-y-4">

  <label class="block">
    <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Zeitpunkt</span>
    <input type="datetime-local" name="given_at" required value="{{ now_local }}" max="{{ now_local }}"
           class="mt-1 w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-3">
  </label>

  <label class="block">
    <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Medikament</span>
    <input type="text" name="med_name" required maxlength="64"
           value="{{ chosen.name if chosen else '' }}"
           class="mt-1 w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-3">
  </label>

  <div class="grid grid-cols-2 gap-3">
    <label class="block">
      <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Dosis</span>
      <input type="number" name="dose_value" required step="0.01" min="0" inputmode="decimal"
             value="{{ chosen.dose if chosen else '' }}"
             class="mt-1 w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-3 text-lg font-semibold">
    </label>
    <label class="block">
      <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Einheit</span>
      <input type="text" name="dose_unit" required maxlength="16"
             value="{{ chosen.unit if chosen else 'IE' }}"
             class="mt-1 w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-3 text-lg">
    </label>
  </div>

  <div>
    <span class="text-sm font-medium text-slate-700 dark:text-slate-300 block mb-1">Verabreichung</span>
    <div class="grid grid-cols-3 gap-2 text-sm">
      {% for val, lbl in routes %}
      <label class="cursor-pointer">
        <input type="radio" name="route" value="{{ val }}" class="peer sr-only"
               {% if (chosen and chosen.route == val) or (not chosen and loop.first) %}checked{% endif %}>
        <div class="text-center px-2 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900
                    peer-checked:bg-brand peer-checked:text-white peer-checked:border-brand">
          {{ lbl }}
        </div>
      </label>
      {% endfor %}
    </div>
  </div>

  <label class="block">
    <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Notiz (optional)</span>
    <input type="text" name="notes" maxlength="500"
           class="mt-1 w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-2">
  </label>

  <button type="submit"
          class="w-full bg-brand hover:bg-brand-dark text-white font-semibold py-4 rounded-xl text-lg">
    Speichern
  </button>
</form>

{% endblock %}
