{% extends "layout.html" %}

{% block title %}Neue Notiz · Baby-Tracker{% endblock %}

{% block content %}

<div class="flex items-center gap-2 mb-3">
  <a href="{{ root }}/timeline" class="text-slate-500 dark:text-slate-400 text-sm">← Zurück</a>
</div>

<h1 class="text-xl font-bold mb-4">Neue Notiz</h1>

<form method="post" action="{{ root }}/notes/new" class="space-y-4">

  <label class="block">
    <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Zeitpunkt</span>
    <input type="datetime-local" name="logged_at" required value="{{ now_local }}"
           class="mt-1 w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-3">
  </label>

  <label class="block">
    <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Notiz</span>
    <textarea name="body" required rows="5" maxlength="2000"
              class="mt-1 w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-2"
              placeholder="Was ist dir aufgefallen? Auffälligkeiten, Besonderheiten, Fragen für die Hebamme..."></textarea>
  </label>

  <label class="block">
    <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Tags (optional)</span>
    <input type="text" name="tags" maxlength="500" placeholder="z.B. unruhig, erstes-lächeln"
           class="mt-1 w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-2">
  </label>

  <button type="submit"
          class="w-full bg-brand hover:bg-brand-dark text-white font-semibold py-4 rounded-xl text-lg">
    Speichern
  </button>
</form>

{% endblock %}
