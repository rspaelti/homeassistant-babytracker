{% extends "layout.html" %}

{% block title %}Clexane · Mama{% endblock %}

{% block content %}

<div class="flex items-center gap-2 mb-3">
  <a href="{{ root }}/mother" class="text-slate-500 dark:text-slate-400 text-sm">← Zurück</a>
</div>

<h1 class="text-xl font-bold mb-4">💉 Clexane-Gabe</h1>

<form method="post" action="{{ root }}/mother/clexane/new" class="space-y-4">

  <label class="block">
    <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Zeitpunkt</span>
    <input type="datetime-local" name="logged_at" required value="{{ now_local }}"
           class="mt-1 w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-3">
  </label>

  <label class="block">
    <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Dosis (mg)</span>
    <input type="number" name="dose_mg" required step="0.01" min="0" max="200" value="60"
           inputmode="decimal"
           class="mt-1 w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-3 text-lg font-semibold">
  </label>

  <label class="block">
    <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Notiz (optional)</span>
    <input type="text" name="notes" maxlength="500"
           placeholder="z.B. Oberschenkel links / Bauchhaut"
           class="mt-1 w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 py-2">
  </label>

  <button type="submit"
          class="w-full bg-brand hover:bg-brand-dark text-white font-semibold py-4 rounded-xl text-lg">
    Speichern
  </button>
</form>

{% endblock %}
