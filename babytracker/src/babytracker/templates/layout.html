{% set root = request.scope.root_path %}
<!DOCTYPE html>
<html lang="de-CH" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f59e0b">
  <title>{% block title %}Baby-Tracker{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#f59e0b', dark: '#d97706' }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
  <script src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js" defer></script>

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E👶%3C/text%3E%3C/svg%3E">

  <script>
    // Auto Dark Mode 19:00–07:00
    (function () {
      const h = new Date().getHours();
      const forced = localStorage.getItem('bt_theme');
      const dark = forced === 'dark' || (forced !== 'light' && (h >= 19 || h < 7));
      if (dark) document.documentElement.classList.add('dark');
    })();
  </script>
</head>
<body class="h-full bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased">

  <header class="sticky top-0 z-20 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur">
    <div class="mx-auto max-w-2xl px-4 h-14 flex items-center justify-between">
      <a href="{{ root }}/" class="font-semibold flex items-center gap-2">
        <span>👶</span>
        <span>{{ child_name or "Baby" }}</span>
      </a>
      <span class="text-xs text-slate-500 dark:text-slate-400">v{{ version }}</span>
    </div>
  </header>

  <main class="mx-auto max-w-2xl px-4 py-4 pb-24">
    {% block content %}{% endblock %}
  </main>

  <nav class="fixed bottom-0 inset-x-0 border-t border-slate-200 dark:border-slate-800 bg-white/95 dark:bg-slate-900/95 backdrop-blur">
    <div class="mx-auto max-w-2xl grid grid-cols-5 text-xs">
      <a href="{{ root }}/" class="flex flex-col items-center py-2 gap-0.5">
        <span class="text-xl">🏠</span><span>Home</span>
      </a>
      <a href="{{ root }}/quick" class="flex flex-col items-center py-2 gap-0.5">
        <span class="text-xl">➕</span><span>Eingabe</span>
      </a>
      <a href="{{ root }}/timeline" class="flex flex-col items-center py-2 gap-0.5">
        <span class="text-xl">📋</span><span>Verlauf</span>
      </a>
      <a href="{{ root }}/mother" class="flex flex-col items-center py-2 gap-0.5">
        <span class="text-xl">🤱</span><span>Mama</span>
      </a>
      <a href="{{ root }}/more" class="flex flex-col items-center py-2 gap-0.5 relative">
        <span class="text-xl">⚙️</span><span>Mehr</span>
      </a>
    </div>
  </nav>

</body>
</html>
