{% set root = request.scope.root_path %}
<!DOCTYPE html>
<html lang="de-CH" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f59e0b">
  <title>{% block title %}Baby-Tracker{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#f59e0b', dark: '#d97706' }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
  <script src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js" defer></script>

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E👶%3C/text%3E%3C/svg%3E">

  <script>
    // Dark Mode: default dark. Modi: 'dark' / 'light' / 'auto' (Auto = 19:00–07:00 dark).
    (function () {
      const mode = localStorage.getItem('bt_theme') || 'dark';
      let dark = true;
      if (mode === 'light') dark = false;
      else if (mode === 'auto') {
        const h = new Date().getHours();
        dark = (h >= 19 || h < 7);
      }
      if (dark) document.documentElement.classList.add('dark');
      window.__btTheme = mode;
    })();

    function btSetTheme(mode) {
      localStorage.setItem('bt_theme', mode);
      const h = new Date().getHours();
      let dark = mode === 'dark' || (mode === 'auto' && (h >= 19 || h < 7));
      document.documentElement.classList.toggle('dark', dark);
      window.__btTheme = mode;
      document.dispatchEvent(new CustomEvent('bt-theme-changed', { detail: { mode } }));
    }

    function btToggleTheme() {
      const cur = localStorage.getItem('bt_theme') || 'dark';
      btSetTheme(cur === 'dark' ? 'light' : 'dark');
    }
  </script>
  <script>
    // iOS Safari (auch im HA-Ingress-iframe): einfacher, robuster Ansatz ohne
    // visualViewport (das iframe feuert dort keine Resize-Events beim Keyboard).
    // Strategie: Bei Focus wird genug Scroll-Platz geschaffen und das Element
    // zentriert, damit die Tastatur es nicht mehr verdeckt.
    (function () {
      function editable(el) {
        if (!el || !el.tagName) return false;
        return ['INPUT', 'TEXTAREA', 'SELECT'].includes(el.tagName);
      }
      function scrollElIntoView(el) {
        if (!el) return;
        try { el.scrollIntoView({ block: 'center', behavior: 'smooth' }); }
        catch (_) { try { el.scrollIntoView(); } catch (__) {} }
      }
      document.addEventListener('focusin', function (e) {
        if (!editable(e.target)) return;
        document.body.classList.add('keyboard-open');
        // Mehrfach scrollen — iOS braucht Zeit bis die Tastatur animiert ist
        setTimeout(() => scrollElIntoView(e.target), 150);
        setTimeout(() => scrollElIntoView(e.target), 400);
        setTimeout(() => scrollElIntoView(e.target), 800);
      });
      document.addEventListener('focusout', function () {
        setTimeout(function () {
          const a = document.activeElement;
          if (!editable(a)) document.body.classList.remove('keyboard-open');
        }, 200);
      });
    })();
  </script>
  <style>
    /* Wenn Tastatur offen: Footer-Nav aus, genug Platz unter dem Form damit
       das fokussierte Element nach oben gescrollt werden kann. */
    body.keyboard-open nav.fixed { display: none !important; }
    main { padding-bottom: 6rem; }
    body.keyboard-open main { padding-bottom: 60vh; }
  </style>
</head>
<body class="h-full bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased">

  <header class="sticky top-0 z-20 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur">
    <div class="mx-auto max-w-2xl px-4 h-14 flex items-center justify-between">
      <a href="{{ root }}/" class="font-semibold flex items-center gap-2">
        <span>👶</span>
        <span>{{ child_name or "Baby" }}</span>
      </a>
      <div class="flex items-center gap-3">
        <button type="button" onclick="btToggleTheme()" aria-label="Theme umschalten"
                class="text-lg leading-none">
          <span class="hidden dark:inline">☀️</span>
          <span class="dark:hidden">🌙</span>
        </button>
        <span class="text-xs text-slate-500 dark:text-slate-400">v{{ version }}</span>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-2xl px-4 py-4 pb-24">
    {% block content %}{% endblock %}
  </main>

  <nav class="fixed bottom-0 inset-x-0 border-t border-slate-200 dark:border-slate-800 bg-white/95 dark:bg-slate-900/95 backdrop-blur">
    <div class="mx-auto max-w-2xl grid grid-cols-5 text-xs">
      <a href="{{ root }}/" class="flex flex-col items-center py-2 gap-0.5">
        <span class="text-xl">🏠</span><span>Home</span>
      </a>
      <a href="{{ root }}/journal" class="flex flex-col items-center py-2 gap-0.5">
        <span class="text-xl">📖</span><span>Tagebuch</span>
      </a>
      <a href="{{ root }}/timeline" class="flex flex-col items-center py-2 gap-0.5">
        <span class="text-xl">📋</span><span>Verlauf</span>
      </a>
      <a href="{{ root }}/mother" class="flex flex-col items-center py-2 gap-0.5">
        <span class="text-xl">🤱</span><span>Mama</span>
      </a>
      <a href="{{ root }}/more" class="flex flex-col items-center py-2 gap-0.5 relative">
        <span class="text-xl">⚙️</span><span>Mehr</span>
      </a>
    </div>
  </nav>

</body>
</html>
